name: Build Valkey

on:
  workflow_call:
    inputs:
      release_version:
        required: true
        type: string
      make_latest:
        required: false
        type: boolean
        default: false
      prerelease:
        required: false
        type: boolean
        default: false
    outputs:
      release_version:
        description: "The version of Valkey being built"
        value: ${{ jobs.prepare.outputs.release_version }}

jobs:
  prepare:
    runs-on: windows-latest
    outputs:
      release_version: ${{ env.RELEASE_VERSION }}
      valkey_dist: ${{ env.VALKEY_DIST }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup environment
        id: setup
        run: |
          $version = "${{ inputs.release_version }}"
          Add-Content -Path $env:GITHUB_ENV -Value "RELEASE_VERSION=$version"
          Add-Content -Path $env:GITHUB_ENV -Value "VALKEY_DIST=Valkey-$version-Windows-x64"
          
          Invoke-WebRequest -Uri "https://github.com/valkey-io/valkey/archive/refs/tags/$version.tar.gz" -OutFile "valkey-$version.tar.gz"
          
          $releaseInfo = ConvertFrom-Json(Invoke-WebRequest -Headers @{'Authorization' = 'Bearer ${{ secrets.GITHUB_TOKEN }}'} -Uri "https://api.github.com/repos/valkey-io/valkey/releases/tags/$version").Content
          $releaseInfo.body -Replace '\#1', 'https://github.com/valkey-io/valkey/pull/1' | Set-Content .\valkey_latest_body.txt

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
  
      - name: Publish ValkeyService.exe
        run: |
          dotnet publish -c Release -r win-x64 --sc -o publish
      
      - name: Upload source and ValkeyService.exe
        uses: actions/upload-artifact@v4
        with:
          name: valkey-source
          path: |
            valkey-${{ env.RELEASE_VERSION }}.tar.gz
            valkey_latest_body.txt
            publish

  build-msys2:
    needs: prepare
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download source
        uses: actions/download-artifact@v4
        with:
          name: valkey-source
      
      - name: Set environment variables
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "RELEASE_VERSION=${{ needs.prepare.outputs.release_version }}"
          Add-Content -Path $env:GITHUB_ENV -Value "VALKEY_DIST=${{ needs.prepare.outputs.valkey_dist }}"
   
      - name: Cache MSYS2 packages
        uses: actions/cache@v4
        with:
          path: |
            C:/msys64/var/cache/pacman/pkg
            C:/msys64/usr/bin
          key: msys2-${{ runner.os }}-${{ hashFiles('.github/workflows/build-valkey.yml') }}
          restore-keys: msys2-${{ runner.os }}-

      - uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64 
          update: true
          install: >- 
            mingw-w64-x86_64-gcc 
            make 
            pkg-config 
            libopenssl 
            openssl-devel 
            zip
          
      - name: Build Valkey with MSYS2
        run: |
          workspace=$(pwd)
          
          # Prepare source code
          # sed -i 's/__GNU_VISIBLE/1/' /usr/include/dlfcn.h
          tar -xzf valkey-${{ env.RELEASE_VERSION }}.tar.gz
          cd valkey-${{ env.RELEASE_VERSION }}/src && ./mkreleasehdr.sh
          sed -i 's/\"\;/\"/' asciilogo.h
          echo '" Valkey for Windows Project Home \n"' >> asciilogo.h
          echo '" https://github.com/valkey-windows/valkey-windows  \n\n";' >> asciilogo.h
          sed -i 's/all: \(.*\) module_tests$/all: \1/' Makefile
          cd ..
          
          # Build Valkey
          make BUILD_TLS=yes CFLAGS="-D_GNU_SOURCE -Wno-char-subscripts -O0" FINAL_LIBS="-Wl,--no-export-all-symbols" -j$(nproc)

          # FINAL_LIBS="-lrt -lm -ldl -Wl,--no-export-all-symbols"
          # make CFLAGS="-D_GNU_SOURCE -D__attribute__\(x\)=" ...

          
          # Create basic package (without service)
          cd $workspace
          mkdir -p ${{ env.VALKEY_DIST }}-msys2
          find valkey-${{ env.RELEASE_VERSION }} -mindepth 1 -maxdepth 2 -type f -regex '.*\(\.exe\|\.conf\)' -exec cp -f "{}" "${{ env.VALKEY_DIST }}-msys2" \;
          cp README.md start.bat /usr/bin/msys-2.0.dll /usr/bin/msys-crypto-3.dll /usr/bin/msys-ssl-3.dll /usr/bin/msys-gcc_s-seh-1.dll /usr/bin/msys-stdc++-6.dll ${{ env.VALKEY_DIST }}-msys2
          sed -i 's/pidfile \/var\/run/pidfile ./' ${{ env.VALKEY_DIST }}-msys2/valkey.conf
          zip -q -r ${{ env.VALKEY_DIST }}-msys2.zip ${{ env.VALKEY_DIST }}-msys2
          
          # Create service package
          cp -r ${{ env.VALKEY_DIST }}-msys2 ${{ env.VALKEY_DIST }}-msys2-with-Service
          cp install_valkey_service.bat uninstall_valkey_service.bat publish/* ${{ env.VALKEY_DIST }}-msys2-with-Service/
          zip -q -r ${{ env.VALKEY_DIST }}-msys2-with-Service.zip ${{ env.VALKEY_DIST }}-msys2-with-Service
        shell: msys2 {0}
            
      - name: Verify MSYS2 version
        run: |
          $VALKEY_MSYS2_VERSION_INFO=(./${{ env.VALKEY_DIST }}-msys2-with-Service/valkey-server.exe --version )
          echo $VALKEY_MSYS2_VERSION_INFO
          If ( -not ( $VALKEY_MSYS2_VERSION_INFO -match "${{ env.RELEASE_VERSION }}" ) ) { 
            Write-Output "MSYS2 verification failed. Expected: ${{ env.RELEASE_VERSION }}, Got: $VALKEY_MSYS2_VERSION_INFO"
            exit 1
          }

      - name: Test Valkey with MSYS2
        timeout-minutes: 5
        run: |
          try {
            Start-Process -NoNewWindow -FilePath ".\${{ env.VALKEY_DIST }}-msys2-with-Service\valkey-server.exe"
            Start-Sleep -Seconds 2
            $value = .\${{ env.VALKEY_DIST }}-msys2-with-Service\valkey-cli.exe SET test_key test_value
            if ($LASTEXITCODE -ne 0) { throw "Failed to set test key" }
            $value = .\${{ env.VALKEY_DIST }}-msys2-with-Service\valkey-cli.exe GET test_key
            if ($value -ne "test_value") { throw "Test failed" }
          }
          finally {
            Stop-Process -Name "valkey-server" -ErrorAction SilentlyContinue
          }

      - name: Calculate hash values for MSYS2 builds
        run: |
          'MSYS2 Builds Hashes' | Out-File hashes-msys2.txt
          '====================' | Out-File -Append hashes-msys2.txt
          Get-FileHash .\${{ env.VALKEY_DIST }}-msys2.zip | Format-List | Out-File -Append hashes-msys2.txt
          Get-FileHash .\${{ env.VALKEY_DIST }}-msys2-with-Service.zip | Format-List | Out-File -Append hashes-msys2.txt
      
      - name: Upload MSYS2 builds
        uses: actions/upload-artifact@v4
        with:
          name: valkey-msys2-builds
          path: |
            ${{ env.VALKEY_DIST }}-msys2.zip
            ${{ env.VALKEY_DIST }}-msys2-with-Service.zip
            hashes-msys2.txt

  release:
    needs: [prepare, build-msys2]
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set environment variables
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "RELEASE_VERSION=${{ needs.prepare.outputs.release_version }}"
          Add-Content -Path $env:GITHUB_ENV -Value "VALKEY_DIST=${{ needs.prepare.outputs.valkey_dist }}"
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Prepare release
        run: |
          # Combine all hash files
          Get-Content -Path valkey-source/valkey_latest_body.txt | Out-File -FilePath release_body.txt
          "`nHashes" | Out-File -Append -FilePath release_body.txt
          "=========" | Out-File -Append -FilePath release_body.txt
          Get-Content -Path valkey-msys2-builds/hashes-msys2.txt | Out-File -Append -FilePath release_body.txt
          Get-Content -Path valkey-cygwin-builds/hashes-cygwin.txt | Out-File -Append -FilePath release_body.txt
          
          # Add workflow information
          "From workflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" | Out-File -Append -FilePath release_body.txt
      
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: false
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
          name: Valkey ${{ env.RELEASE_VERSION }} for Windows
          tag_name: ${{ env.RELEASE_VERSION }}
          body_path: release_body.txt
          make_latest: "${{ inputs.make_latest }}"
          prerelease: ${{ inputs.prerelease }}
          files: |
            valkey-cygwin-builds/${{ env.VALKEY_DIST }}-cygwin.zip
            valkey-cygwin-builds/${{ env.VALKEY_DIST }}-cygwin-with-Service.zip
            valkey-msys2-builds/${{ env.VALKEY_DIST }}-msys2.zip
            valkey-msys2-builds/${{ env.VALKEY_DIST }}-msys2-with-Service.zip
